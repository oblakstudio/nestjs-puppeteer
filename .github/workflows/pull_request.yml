name: Test

on:
  push:
    branches:
      - master
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
  merge_group:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm clean-install
      - run: npm audit signatures
      - run: npm run lint
      - run: npm run build

  test:
    name: Test Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 20
          - 22
          - 24
    steps:
      - uses: actions/checkout@v6
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm clean-install
      - name: Ensure dependencies are compatible with the version of node
        run: npx ls-engines
      - run: aa-exec --profile=chrome npm run test:e2e

  test-libs:
    name: Test NestJS ${{ matrix.nest-version }} / Puppeteer ${{ matrix.puppeteer-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        nest-version:
          - 10
          - 11
        puppeteer-version:
          - 23
          - 24
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm clean-install
      - name: Install matrix versions of NestJS and Puppeteer
        run: |
          npm install --no-save \
            @nestjs/common@^${{ matrix.nest-version }} \
            @nestjs/core@^${{ matrix.nest-version }} \
            @nestjs/platform-express@^${{ matrix.nest-version }} \
            @nestjs/testing@^${{ matrix.nest-version }} \
            puppeteer@^${{ matrix.puppeteer-version }}
      - run: aa-exec --profile=chrome npm run test:e2e

  coverage:
    name: Coverage
    if: github.event_name == 'merge_group' || github.event_name == 'push'
    runs-on: ubuntu-latest
    needs:
      - lint
      - test
      - test-libs
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm
      - run: npm clean-install
      - run: aa-exec --profile=chrome npm run test:e2e:cov
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          disable_search: true
          fail_ci_if_error: true
          files: ./tests/coverage/lcov.info
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
